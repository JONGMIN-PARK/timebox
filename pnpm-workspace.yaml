packages:
  - "packages/*"

# --- Dependency build-script policy ---
# esbuild must run its install script to fetch the platform binary used by the Vite client build.
# better-sqlite3 is an unused transitive native dep (the server uses Postgres via `pg`), so its
# native compile is skipped to avoid ERR_PNPM_IGNORED_BUILDS failing the deploy.

# pnpm v10.26+ / v11 — current home for build-script policy (map of name -> allow?).
allowBuilds:
  esbuild: true
  better-sqlite3: false

# pnpm v10.0–v10.25 fallback (these keys were removed in v11, kept for older pnpm versions).
onlyBuiltDependencies:
  - esbuild
ignoredBuiltDependencies:
  - better-sqlite3
