name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  version-bump-and-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto version bump
        id: version
        run: |
          set -e

          # Determine version bump type from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s" -10)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="%s")
          fi

          # Classify: major (breaking), minor (feat/add/new), patch (fix/etc)
          BUMP="patch"
          if echo "$COMMITS" | grep -iqE "BREAKING|!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -iqE "^(feat|add|new|feature)|추가|신규"; then
            BUMP="minor"
          fi

          # Read current version
          CURRENT=$(node -p "require('./packages/shared/version.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Bump version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TODAY=$(date +%Y-%m-%d)

          echo "Version bump: $CURRENT → $NEW_VERSION ($BUMP)"

          # Collect change log
          if [ -z "$LAST_TAG" ]; then
            CHANGES=$(git log --oneline --format="• %s" -10)
          else
            CHANGES=$(git log ${LAST_TAG}..HEAD --oneline --format="• %s")
          fi

          # Update version.json
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('packages/shared/version.json', 'utf-8'));
            v.version = '${NEW_VERSION}';
            v.date = '${TODAY}';
            fs.writeFileSync('packages/shared/version.json', JSON.stringify(v, null, 2) + '\n');
          "

          # Update package.json files
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'packages/server/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          # Commit version bump
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: bump version to v${NEW_VERSION}"
            git tag "v${NEW_VERSION}"
            git push origin main --tags
          }

          # Export for next steps
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          # Save changes to multiline output
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changes<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "${CHANGES}" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Render
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook triggered"

      - name: Notify via Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_IDS: ${{ secrets.TELEGRAM_ADMIN_CHAT_IDS }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          CHANGES="${{ steps.version.outputs.changes }}"
          KO_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')

          MSG="🚀 *TimeBox v${VERSION} 배포 완료*
          ⏰ ${KO_TIME}

          📝 *변경사항*
          ${CHANGES}

          ✅ 배포 시작됨"

          # Send to each admin chat ID (comma-separated)
          IFS=',' read -ra CHAT_IDS <<< "$TELEGRAM_ADMIN_CHAT_IDS"
          for CHAT_ID in "${CHAT_IDS[@]}"; do
            CHAT_ID=$(echo "$CHAT_ID" | xargs) # trim whitespace
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="Markdown" || echo "Failed to send to ${CHAT_ID}"
          done
