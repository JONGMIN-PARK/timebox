name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  version-bump-and-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto version bump
        run: |
          set -e

          # Determine version bump type from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s" -10)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="%s")
          fi

          # Classify: major (breaking), minor (feat/add/new), patch (fix/etc)
          BUMP="patch"
          if echo "$COMMITS" | grep -iqE "BREAKING|!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -iqE "^(feat|add|new|feature)|추가|신규"; then
            BUMP="minor"
          fi

          # Read current version
          CURRENT=$(node -p "require('./packages/shared/version.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Bump version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TODAY=$(date +%Y-%m-%d)

          echo "Version bump: $CURRENT → $NEW_VERSION ($BUMP)"

          # Save current deploy changes for server to read
          if [ -z "$LAST_TAG" ]; then
            git log --oneline --format="• %s" -10 > packages/shared/deploy-changes.txt
          else
            git log ${LAST_TAG}..HEAD --oneline --format="• %s" > packages/shared/deploy-changes.txt
          fi

          # Update version.json
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('packages/shared/version.json', 'utf-8'));
            v.version = '${NEW_VERSION}';
            v.date = '${TODAY}';
            fs.writeFileSync('packages/shared/version.json', JSON.stringify(v, null, 2) + '\n');
          "

          # Update package.json files
          node -e "
            const fs = require('fs');
            for (const p of ['package.json', 'packages/server/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
              pkg.version = '${NEW_VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          # Commit version bump + deploy changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: bump version to v${NEW_VERSION}"
            git tag "v${NEW_VERSION}"
            git push origin main --tags
          }

      - name: Deploy to Render
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook triggered"
