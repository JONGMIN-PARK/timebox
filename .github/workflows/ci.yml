name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  version-bump-and-deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto version bump and changelog
        id: version
        run: |
          set -e

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s" -10)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="%s")
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -iqE "BREAKING|!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -iqE "^(feat|add|new|feature)|추가|신규"; then
            BUMP="minor"
          fi

          CURRENT=$(node -p "require('./packages/shared/version.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TODAY=$(date +%Y-%m-%d)
          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "Version bump: $CURRENT -> $NEW_VERSION ($BUMP) [$SHORT_SHA]"

          if [ -z "$LAST_TAG" ]; then
            CHANGES=$(git log --oneline --format="%h %s" -10 | grep -ivE "chore:|merge:" || true)
          else
            CHANGES=$(git log ${LAST_TAG}..HEAD --oneline --format="%h %s" | grep -ivE "chore:|merge:" || true)
          fi

          export CHANGES
          node -e "
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('packages/shared/version.json', 'utf-8'));
          const commits = (process.env.CHANGES || '').split('\n').filter(Boolean);
          const cats = { feat: [], fix: [], other: [] };
          for (const c of commits) {
            const hash = c.slice(0, 7);
            const msg = c.slice(8);
            const entry = msg.replace(/^(feat|fix)[:(]?\\s*/i, '').replace(/\\):\\s*/, ': ') + ' (' + hash + ')';
            if (/^feat/i.test(msg)) cats.feat.push(entry);
            else if (/^fix/i.test(msg)) cats.fix.push(entry);
            else cats.other.push(entry);
          }
          const changes = [];
          if (cats.feat.length) changes.push({ category: '신규 기능', emoji: '✨', items: cats.feat });
          if (cats.fix.length) changes.push({ category: '버그 수정', emoji: '🐛', items: cats.fix });
          if (cats.other.length) changes.push({ category: '기타', emoji: '🔧', items: cats.other });
          const highlights = [...cats.feat, ...cats.fix].slice(0, 3);
          v.version = '${NEW_VERSION}';
          v.date = '${TODAY}';
          v.highlights = highlights.length ? highlights : v.highlights;
          v.changes = changes.length ? changes : v.changes;
          fs.writeFileSync('packages/shared/version.json', JSON.stringify(v, null, 2) + '\n');
          " || true

          node -e "
          const fs = require('fs');
          const cl = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf-8') : '';
          const items = (process.env.CHANGES || '').split('\n').filter(Boolean);
          if (items.length === 0) process.exit(0);
          let entry = '\n## v${NEW_VERSION} (${SHORT_SHA}) — ${TODAY}\n\n';
          entry += '| 항목 | 설명 | 커밋 |\n|------|------|------|\n';
          for (const item of items) {
            const hash = item.slice(0, 7);
            const msg = item.slice(8);
            const type = /^feat/i.test(msg) ? '✨ 기능' : /^fix/i.test(msg) ? '🐛 수정' : '🔧 기타';
            const desc = msg.replace(/^(feat|fix|chore|refactor)[:(]?[^)]*\\)?\\s*:?\\s*/i, '');
            entry += '| ' + type + ' | ' + desc + ' | ' + hash + ' |\n';
          }
          const firstHeading = cl.indexOf('\n## ');
          if (firstHeading > 0) {
            fs.writeFileSync('CHANGELOG.md', cl.slice(0, firstHeading) + entry + cl.slice(firstHeading));
          } else {
            fs.writeFileSync('CHANGELOG.md', '# TimeBox Changelog\n' + entry + '\n' + cl);
          }
          " || true

          node -e "
          const fs = require('fs');
          for (const p of ['package.json', 'packages/server/package.json']) {
            const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
            pkg.version = '${NEW_VERSION}';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          }
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || {
            git commit -m "chore: bump version to v${NEW_VERSION} [${SHORT_SHA}]"
            git tag "v${NEW_VERSION}"
            git push origin main --tags
          }

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "prev_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          FEAT_ITEMS=""
          FIX_ITEMS=""
          OTHER_ITEMS=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HASH=$(echo "$line" | cut -c1-7)
            MSG=$(echo "$line" | cut -c9-)
            DESC=$(echo "$MSG" | sed -E 's/^(feat|fix|chore|refactor)[:(]?[^)]*\)?\s*:?\s*//i')
            if echo "$MSG" | grep -iqE "^feat"; then
              FEAT_ITEMS="${FEAT_ITEMS}  ✨ ${DESC} (${HASH})\n"
            elif echo "$MSG" | grep -iqE "^fix"; then
              FIX_ITEMS="${FIX_ITEMS}  🐛 ${DESC} (${HASH})\n"
            else
              OTHER_ITEMS="${OTHER_ITEMS}  🔧 ${DESC} (${HASH})\n"
            fi
          done <<< "$CHANGES"

          DETAILED=""
          [ -n "$FEAT_ITEMS" ] && DETAILED="${DETAILED}*신규 기능*\n${FEAT_ITEMS}\n"
          [ -n "$FIX_ITEMS" ] && DETAILED="${DETAILED}*버그 수정*\n${FIX_ITEMS}\n"
          [ -n "$OTHER_ITEMS" ] && DETAILED="${DETAILED}*기타*\n${OTHER_ITEMS}\n"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changes<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "${DETAILED}" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Render
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Deploy hook triggered"

      - name: Notify via Telegram
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_IDS: ${{ secrets.TELEGRAM_ADMIN_CHAT_IDS }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          PREV="${{ steps.version.outputs.prev_version }}"
          BUMP="${{ steps.version.outputs.bump_type }}"
          SHA="${{ steps.version.outputs.short_sha }}"
          CHANGES="${{ steps.version.outputs.changes }}"
          KO_TIME=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')

          case "$BUMP" in
            major) BUMP_LABEL="🔴 MAJOR" ;;
            minor) BUMP_LABEL="🟡 기능" ;;
            patch) BUMP_LABEL="🟢 패치" ;;
            *) BUMP_LABEL="📦" ;;
          esac

          MSG=$(cat <<EOMSG
          🚀 *TimeBox v${VERSION}* (${SHA})
          ${BUMP_LABEL} v${PREV} → v${VERSION}
          ⏰ ${KO_TIME}

          📝 *변경사항*
          ${CHANGES}
          ✅ Render 배포 시작됨
          EOMSG
          )

          IFS=',' read -ra CHAT_IDS <<< "$TELEGRAM_ADMIN_CHAT_IDS"
          for CHAT_ID in "${CHAT_IDS[@]}"; do
            CHAT_ID=$(echo "$CHAT_ID" | xargs)
            curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode="Markdown" || echo "Failed to send to ${CHAT_ID}"
          done
