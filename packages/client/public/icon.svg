<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="252" r="138" fill="none" stroke="#ffffff" stroke-width="24" opacity="0.95"/>
  <!-- Hour markers -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6">
    <line x1="256" y1="134" x2="256" y2="152"/>
    <line x1="256" y1="352" x2="256" y2="370"/>
    <line x1="138" y1="252" x2="156" y2="252"/>
    <line x1="356" y1="252" x2="374" y2="252"/>
  </g>
  <!-- Hour hand -->
  <line x1="256" y1="252" x2="256" y2="178" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="252" x2="320" y2="196" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="252" r="12" fill="#ffffff"/>
  <!-- Hourglass / box accent at bottom -->
  <g transform="translate(256, 430)" opacity="0.9">
    <rect x="-48" y="-18" width="96" height="36" rx="8" fill="#ffffff" opacity="0.2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="24" fill="#ffffff" letter-spacing="2">TIMEBOX</text>
  </g>
</svg>
