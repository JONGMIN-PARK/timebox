services:
  - type: web
    name: timebox
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      export PNPM_HOME="/opt/render/.cache/pnpm"
      export PATH="$PNPM_HOME:$PATH"
      npm install -g pnpm &&
      pnpm config set store-dir /opt/render/.cache/pnpm-store &&
      pnpm install --frozen-lockfile &&
      pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
